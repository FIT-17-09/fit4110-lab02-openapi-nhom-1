openapi: 3.1.0
info:
  title: Service A4 - AI Vision API
  version: 1.0.0
  description: Hợp đồng API cho Service AI Vision (A4), phục vụ nhận diện dị thường từ luồng Camera (A2).
  contact:
    name: Nhóm 1
    email: n1@student.example.com
servers:
  - url: http://localhost:4010
    description: Prism Mock Server

tags:
  - name: Health
    description: API kiểm tra trạng thái
  - name: Models
    description: API quản lý thông tin mô hình AI
  - name: Detection
    description: API nhận diện dị thường qua luồng Camera

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Kiểm tra sức khỏe dịch vụ AI Vision
      responses:
        "200":
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "up" }

  /api/v1/vision/models/info:
    get:
      operationId: getModelsInfo
      tags: [Models]
      summary: Lấy thông tin các AI model đang chạy
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  active_model:
                    { type: string, example: "yolov8-campus-custom" }
                  version: { type: string, example: "v2.1" }

  /api/v1/vision/detect:
    post:
      operationId: submitDetect
      tags: [Detection]
      summary: Gửi frame ảnh để nhận diện dị thường
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectRequest"
      responses:
        "200":
          description: Nhận diện thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
        "400":
          description: Lỗi dữ liệu gửi lên
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: Unprocessable Entity (ảnh mờ, lỗi)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /api/v1/vision/detections/{detectionId}:
    get:
      operationId: getDetectionById
      tags: [Detection]
      summary: Truy vấn kết quả nhận diện cũ theo ID
      parameters:
        - in: path
          name: detectionId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tìm thấy kết quả
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
        "404":
          description: Không tìm thấy
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  schemas:
    DetectRequest:
      type: object
      required: [frame_url, camera_id]
      properties:
        frame_url:
          { type: string, format: uri, example: "http://example.com/frame.jpg" }
        camera_id: { type: string, example: "cam-gate-01" }
        timestamp: { type: string, format: date-time }
        # YÊU CẦU: Có trường dùng union type với null
        note:
          type: ["string", "null"]
          description: "Ghi chú thêm từ camera, có thể null"

    DetectionResult:
      type: object
      required: [detectionId, anomaly_detected]
      properties:
        detectionId: { type: string, example: "det-12345" }
        anomaly_detected: { type: boolean, example: true }
        confidence_score:
          type: ["number", "null"]
          description: "Độ tin cậy của phát hiện, null nếu không có dị thường"
          example: 0.95
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"

    # YÊU CẦU: oneOf + discriminator
    Finding:
      type: object
      required: [finding_type]
      properties:
        finding_type:
          type: string
      discriminator:
        propertyName: finding_type
      oneOf:
        - $ref: "#/components/schemas/PersonFinding"
        - $ref: "#/components/schemas/ObjectFinding"

    PersonFinding:
      type: object
      properties:
        finding_type: { type: string, enum: [person] }
        risk_level: { type: string, enum: [low, medium, high] }
        is_unauthorized: { type: boolean, example: true }

    ObjectFinding:
      type: object
      properties:
        finding_type: { type: string, enum: [object] }
        risk_level: { type: string, enum: [low, medium, high] }
        object_class: { type: string, example: "abandoned_bag" }

    # YÊU CẦU: Lỗi chuẩn Problem Details (RFC 7807) (Rule: campus-require-problem-schema)
    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
      required: [type, title, status]
